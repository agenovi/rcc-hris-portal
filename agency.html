<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>RCC Merchandiser Openings</title>
<style>
  :root{--navy:#1E3A5F;--navy-d:#142a45;--ink:#1F2A37;--muted:#6B7785;--line:#E3E8EF;--bg:#F4F6F8;--gold:#c8a86a;
    --green:#1c6b3f;--green-bg:#e8f2eb;--amber:#8a6a14;--amber-bg:#fdf6e3;}
  *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  body{background:var(--bg);color:var(--ink);line-height:1.5;}
  .top{background:linear-gradient(135deg,var(--navy-d),var(--navy));color:#fff;padding:20px 22px;}
  .top h1{font-size:20px;font-weight:800;}
  .top .s{opacity:.8;font-size:13px;margin-top:2px;}
  .wrap{max-width:880px;margin:0 auto;padding:18px 16px 60px;}
  .tabs{display:flex;gap:8px;margin:14px 0;}
  .tab{border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px 14px;font-weight:700;font-size:13.5px;color:var(--navy);cursor:pointer;}
  .tab.sel{background:var(--navy);color:#fff;border-color:var(--navy);}
  .grp{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700;margin:16px 0 6px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .card .nm{font-weight:700;color:var(--navy);font-size:15px;}
  .card .loc{font-size:12.5px;color:var(--muted);}
  .chips{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap;}
  .chip{font-size:12px;font-weight:700;padding:4px 9px;border-radius:20px;}
  .chip.open{background:var(--green-bg);color:var(--green);}
  .chip.rev{background:#e7f1f5;color:#2c6e8f;}
  .chip.hir{background:var(--bg);color:var(--muted);}
  .chip.urg{background:#fdecea;color:#c0392b;}
  .dates{font-size:11.5px;color:var(--muted);margin-top:3px;}
  .dates .od{color:#c0392b;font-weight:700;}
  .btn{background:var(--navy);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-weight:700;font-size:13px;cursor:pointer;}
  .btn.ghost{background:#fff;color:var(--navy);border:1px solid var(--line);}
  .btn:disabled{opacity:.5;cursor:default;}
  .modal{position:fixed;inset:0;z-index:50;background:rgba(14,30,50,.5);display:flex;align-items:center;justify-content:center;padding:20px;}
  .sheet{background:#fff;border-radius:14px;max-width:420px;width:100%;padding:22px;}
  .sheet h2{color:var(--navy);font-size:18px;margin-bottom:2px;}
  label{font-size:12px;font-weight:700;color:var(--muted);display:block;margin:10px 0 4px;}
  input,textarea,select{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:14px;}
  .req{color:#c0392b;}
  .msg{font-size:13px;margin:8px 0;min-height:18px;}
  .empty{color:var(--muted);font-size:14px;padding:20px;text-align:center;}
  table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  th,td{text-align:left;padding:10px 12px;font-size:13.5px;border-bottom:1px solid var(--line);}
  th{background:var(--navy);color:#fff;font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;}
  .pill{font-size:11.5px;font-weight:700;padding:3px 8px;border-radius:20px;background:var(--bg);color:var(--muted);}
  .rsn{font-size:11px;color:#c0392b;margin-top:4px;max-width:240px;}
  .foot{font-size:12px;color:var(--muted);margin-top:18px;text-align:center;}
</style></head>
<body>
  <div class="top"><h1>RCC Merchandiser Openings</h1><div class="s" id="who">Loading…</div></div>
  <div class="wrap">
    <div id="candLinkBox" style="background:#eef4ef;border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:14px;"></div>
    <div class="tabs">
      <div class="tab sel" id="tabOpen" onclick="show('open')">Open positions</div>
      <div class="tab" id="tabMine" onclick="show('mine')">My submissions</div>
    </div>
    <div id="body"><div class="empty">Loading…</div></div>
    <div class="foot">You only see open positions and your own submitted candidates. Counts are anonymized. — RCC</div>
  </div>
<script>
const FN="https://jtfkpmvievetihhfdmqb.supabase.co/functions/v1/agency";
const token=new URLSearchParams(location.search).get("t")||"";
let DATA={openings:[],my_submissions:[],agency:""}, TAB="open";
const esc=s=>(s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

async function load(){
  if(!token){ document.getElementById("body").innerHTML='<div class="empty">This link is missing its access code. Please use the link RCC gave you.</div>'; document.getElementById("who").textContent="No access"; return; }
  try{
    const r=await fetch(`${FN}?token=${encodeURIComponent(token)}&action=board`);
    const d=await r.json();
    if(d.error){ document.getElementById("body").innerHTML=`<div class="empty">${esc(d.error)}</div>`; document.getElementById("who").textContent="No access"; return; }
    DATA=d;
    const slots=(d.openings||[]).reduce((s,o)=>s+(Number(o.open_slots)||0),0);
    const myActive=(d.my_submissions||[]).filter(x=>!["DRAFT","HIRED","REJECTED"].includes(x.status)).length;
    document.getElementById("who").textContent=`${d.agency} · ${d.openings.length} stores · ${slots} open positions · ${d.total_active||0} candidates in process (${myActive} yours)`;
    const to=document.getElementById("tabOpen"); if(to) to.textContent=`Open positions (${slots})`;
    const tm=document.getElementById("tabMine"); if(tm) tm.textContent=`My submissions (${(d.my_submissions||[]).length})`;
    render();
  }catch(e){ document.getElementById("body").innerHTML=`<div class="empty">Couldn't load right now. Please try again.</div>`; }
}
function show(t){ TAB=t; document.getElementById("tabOpen").classList.toggle("sel",t==="open"); document.getElementById("tabMine").classList.toggle("sel",t==="mine"); render(); }
function render(){
  const b=document.getElementById("body");
  if(TAB==="mine"){
    const m=DATA.my_submissions||[];
    const _inProc=m.filter(x=>!["DRAFT","HIRED","REJECTED"].includes(x.status)).length, _dr=m.filter(x=>x.status==="DRAFT").length, _hi=m.filter(x=>x.status==="HIRED").length, _ns=m.filter(x=>x.status==="REJECTED").length;
    const _sum=m.length?`<div style="background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px;"><b>${m.length}</b> total${_dr?` · ${_dr} draft`:""} · <b>${_inProc}</b> in process${_hi?` · ${_hi} hired`:""}${_ns?` · ${_ns} not selected`:""}</div>`:"";
    b.innerHTML = _sum + (m.length ? `<table><thead><tr><th>Candidate</th><th>Store</th><th>Status</th><th>Submitted</th><th></th></tr></thead><tbody>`+
      m.map((x,i)=>{
        const draft=x.status==="DRAFT";
        const act=draft?`<button class="btn ghost" onclick='editDraft(${i})'>Edit</button> <button class="btn" onclick='shipDraft(${i})'>Submit to RCC</button>`:"";
        return `<tr><td><b>${esc(x.name)}</b><div style="font-size:11.5px;color:var(--muted);">${esc(x.position||"")}</div></td><td>${esc(x.store||"—")}</td><td><span class="pill"${draft?' style="background:#fdf6e3;color:#8a6a14;"':''}>${esc(statusLabel(x.status))}</span>${x.status==="REJECTED"&&x.reason?`<div class="rsn">${esc(x.reason)}</div>`:""}</td><td style="white-space:nowrap;font-size:12px;color:${x.submitted&&(Date.now()-new Date(x.submitted))/86400000>14?'#c0392b':'var(--muted)'};">${x.submitted?new Date(x.submitted).toLocaleDateString(undefined,{month:'short',day:'numeric'})+' · '+(Math.floor((Date.now()-new Date(x.submitted))/86400000)||0)+'d':'—'}</td><td style="white-space:nowrap;text-align:right;">${act}</td></tr>`;
      }).join("")+
      `</tbody></table>` : `<div class="empty">No candidates yet. Open a position and click “Submit a candidate” — it saves as a draft you review before sending to RCC.</div>`);
    return;
  }
  const ops=DATA.openings||[];
  if(!ops.length){ b.innerHTML='<div class="empty">No open positions right now. Check back soon.</div>'; return; }
  const fmtD=s=>{ if(!s) return ""; const d=new Date(s+"T00:00:00"); return isNaN(d)?"":d.toLocaleDateString(undefined,{month:"short",day:"numeric"}); };
  const today=new Date(new Date().toDateString());
  b.innerHTML=ops.map(o=>{
      const overdue=o.target_fill_date && new Date(o.target_fill_date+"T00:00:00")<today;
      let when;
      if(o.priority==="Urgent" && !o.target_fill_date) when=`<span class="od">Urgent — needed now</span>`;
      else if(o.target_fill_date) when=`<span class="${overdue?'od':''}">Fill by ${fmtD(o.target_fill_date)}${overdue?" · overdue":""}</span>`;
      else when=`Open`;
      return `<div class="card">
      <div style="flex:1;min-width:140px;"><div class="nm">${esc(o.store)}</div>
        <div class="loc">${esc(o.city||"")}${o.area?" · "+esc(o.area):""}${o.category?" · "+(o.category==="CN"?"Concession":"Company-Op"):""}</div>
        <div class="dates">Posted ${fmtD(o.date_posted)} · ${when}</div></div>
      <div class="chips">
        <span class="chip open">${o.open_slots} shortfall</span>
        <span class="chip rev">${o.in_review} in review${o.my_in_review?` · ${o.my_in_review} yours`:""}</span>
        ${o.hired?`<span class="chip hir">${o.hired} hired</span>`:""}
        ${o.urgent?`<span class="chip urg">Urgent</span>`:""}
      </div>
      <button class="btn" onclick='openSubmit(${JSON.stringify(o.store)})'>Submit a candidate</button>
    </div>`;}).join("");
}
function statusLabel(p){ if(p==="DRAFT") return "Draft — not sent"; if(p==="HIRED") return "Hired"; if(p==="REJECTED") return "Not selected"; return "In process"; }

function openSubmit(store){
  let m=document.getElementById("subModal"); if(!m){ m=document.createElement("div"); m.id="subModal"; document.body.appendChild(m); }
  m.className="modal";
  m.innerHTML=`<div class="sheet">
    <h2>Add a candidate</h2>
    <div style="color:var(--muted);font-size:13px;">For <b>${esc(store)}</b> — saved as a draft you review before sending to RCC.</div>
    <label>Candidate full name <span class="req">*</span></label><input id="s_name">
    <label>Position</label><input id="s_pos" value="Merchandiser">
    <label>Contact number</label><input id="s_contact">
    <label>Email (optional)</label><input id="s_email" type="email">
    <label>Notes (optional)</label><textarea id="s_notes" rows="2"></textarea>
    <div class="msg" id="s_msg"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px;">
      <button class="btn ghost" onclick="document.getElementById('subModal').remove()">Cancel</button>
      <button class="btn" id="s_save">Save as draft</button>
    </div></div>`;
  m.onclick=e=>{ if(e.target===m) m.remove(); };
  document.getElementById("s_save").onclick=async()=>{
    const name=document.getElementById("s_name").value.trim(), msg=document.getElementById("s_msg");
    if(!name){ msg.style.color="#c0392b"; msg.textContent="Candidate name is required."; return; }
    const btn=document.getElementById("s_save"); btn.disabled=true; btn.textContent="Saving…";
    try{
      const r=await fetch(FN,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
        token, action:"submit", name, store,
        position:document.getElementById("s_pos").value, contact:document.getElementById("s_contact").value, email:document.getElementById("s_email").value, notes:document.getElementById("s_notes").value })});
      const d=await r.json();
      if(!d.ok){ btn.disabled=false; btn.textContent="Save as draft"; msg.style.color="#c0392b"; msg.textContent=d.error||"Couldn't save. Try again."; return; }
      msg.style.color="#1c6b3f"; msg.textContent="✓ Saved as a draft. Review it under “My submissions”, then Submit to RCC.";
      setTimeout(()=>{ m.remove(); TAB="mine"; load(); }, 1500);
    }catch(e){ btn.disabled=false; btn.textContent="Save as draft"; msg.style.color="#c0392b"; msg.textContent="Couldn't save. Try again."; }
  };
}
function shipDraft(i){
  const x=(DATA.my_submissions||[])[i]; if(!x) return;
  if(!confirm("Submit "+x.name+" to RCC? Once submitted it can no longer be edited here.")) return;
  fetch(FN,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token,action:"ship",id:x.id})})
    .then(r=>r.json()).then(d=>{ if(!d.ok){ alert(d.error||"Couldn't submit."); return; } load(); })
    .catch(()=>alert("Couldn't submit. Please try again."));
}
function editDraft(i){
  const x=(DATA.my_submissions||[])[i]; if(!x) return;
  let m=document.getElementById("subModal"); if(!m){ m=document.createElement("div"); m.id="subModal"; document.body.appendChild(m); }
  m.className="modal";
  m.innerHTML=`<div class="sheet">
    <h2>Edit candidate</h2>
    <div style="color:var(--muted);font-size:13px;">For <b>${esc(x.store)}</b> — fill in the details, save, then Submit to RCC.</div>
    <label>Candidate full name <span class="req">*</span></label><input id="s_name" value="${esc(x.name||"")}">
    <label>Position</label><input id="s_pos" value="${esc(x.position||"Merchandiser")}">
    <label>Contact number</label><input id="s_contact" value="${esc(x.contact||"")}">
    <label>Email</label><input id="s_email" value="${esc(x.email||"")}">
    <label>Notes (optional)</label><textarea id="s_notes" rows="2">${esc(x.notes||"")}</textarea>
    <div class="msg" id="s_msg"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px;">
      <button class="btn ghost" onclick="document.getElementById('subModal').remove()">Cancel</button>
      <button class="btn" id="s_save">Save draft</button>
    </div></div>`;
  m.onclick=e=>{ if(e.target===m) m.remove(); };
  document.getElementById("s_save").onclick=async()=>{
    const name=document.getElementById("s_name").value.trim(), msg=document.getElementById("s_msg");
    if(!name){ msg.style.color="#c0392b"; msg.textContent="Candidate name is required."; return; }
    const btn=document.getElementById("s_save"); btn.disabled=true; btn.textContent="Saving…";
    try{
      const r=await fetch(FN,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
        token, action:"update", id:x.id, name, position:document.getElementById("s_pos").value,
        contact:document.getElementById("s_contact").value, email:document.getElementById("s_email").value, notes:document.getElementById("s_notes").value })});
      const d=await r.json();
      if(!d.ok){ btn.disabled=false; btn.textContent="Save draft"; msg.style.color="#c0392b"; msg.textContent=d.error||"Couldn't save."; return; }
      msg.style.color="#1c6b3f"; msg.textContent="✓ Saved.";
      setTimeout(()=>{ m.remove(); load(); }, 800);
    }catch(e){ btn.disabled=false; btn.textContent="Save draft"; msg.style.color="#c0392b"; msg.textContent="Couldn't save. Try again."; }
  };
}
load();
(function(){ const cb=document.getElementById("candLinkBox"); if(!cb||!token){ if(cb) cb.style.display="none"; return; }
  const link="https://agenovi.github.io/rcc-hris-portal/direct-apply.html?ag="+encodeURIComponent(token);
  cb.innerHTML=`<div style="font-weight:800;color:var(--navy);font-size:13.5px;margin-bottom:2px;">📩 Candidate application link</div>
    <div style="font-size:12.5px;color:var(--muted);margin-bottom:8px;">Share this with your candidates so they fill in the full application <b>themselves</b> — it lands in <b>My submissions</b> as a draft for you to review, then Submit to RCC.</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn" id="copyCand" style="width:auto;padding:10px 20px;">📩 APPLICATION — Copy link</button>
      <a class="btn" href="${esc(link)}" target="_blank" rel="noopener" style="width:auto;padding:10px 18px;background:#fff;color:var(--navy);border:1px solid #cdd5de;text-decoration:none;">Preview</a>
    </div>`;
  const cc=document.getElementById("copyCand"); if(cc) cc.onclick=()=>{ if(navigator.clipboard) navigator.clipboard.writeText(link); cc.textContent="✓ Copied — share with your candidate"; setTimeout(()=>cc.textContent="📩 APPLICATION — Copy link",1600); };
})();
</script></body></html>
