<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RCC Employee Loan Portal</title>
<style>
  :root{
    --navy:#1E3A5F; --navy-dark:#142a45;
    --green:#1F6B52; --green-dark:#15543F; --green-soft:#E7F1ED;
    --amber:#B7791F; --amber-soft:#FBF1DD;
    --red:#B02A37; --red-soft:#FBE9EA;
    --purple:#5B4B8A; --purple-soft:#ECE9F4;
    --bg:#F4F6F8; --card:#FFFFFF; --ink:#1F2A37; --muted:#6B7785;
    --line:#E3E8EF; --line-soft:#EEF1F5;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;}
  /* header */
  header{background:linear-gradient(135deg,var(--navy),var(--navy-dark));color:#fff;padding:18px 28px;}
  .hwrap{max-width:1120px;margin:0 auto;display:flex;align-items:center;gap:15px;}
  .mark{width:44px;height:44px;flex:none;}
  .htxt h1{font-size:16px;font-weight:700;letter-spacing:.04em;}
  .htxt .sub{font-size:12.5px;color:#C5D2E2;margin-top:2px;}
  .tagline{margin-left:auto;text-align:right;}
  .tagline .big{font-size:12.5px;font-weight:600;letter-spacing:.16em;}
  .tagline .small{font-size:10.5px;color:#9FB2C9;margin-top:2px;}
  /* tabs */
  .tabbar{background:var(--card);border-bottom:1px solid var(--line);}
  .tabwrap{max-width:1120px;margin:0 auto;display:flex;gap:2px;padding:0 28px;flex-wrap:wrap;}
  .tab{padding:13px 16px;font-size:13px;font-weight:600;color:var(--muted);
    background:none;border:none;cursor:pointer;border-bottom:3px solid transparent;}
  .tab.active{color:var(--navy);border-bottom-color:var(--green);}
  .tab .cnt{display:inline-block;min-width:17px;height:17px;line-height:17px;font-size:10.5px;
    background:var(--line);color:var(--muted);border-radius:9px;margin-left:5px;padding:0 4px;}
  .tab.active .cnt{background:var(--green);color:#fff;}
  main{max-width:1120px;margin:0 auto;padding:24px 28px 70px;}
  /* stepper */
  .stepper{display:flex;gap:5px;margin-bottom:22px;flex-wrap:wrap;}
  .stepper .st{display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:8px;
    font-size:11.8px;font-weight:600;color:var(--muted);background:var(--card);
    border:1px solid var(--line);cursor:pointer;flex:1;min-width:115px;}
  .stepper .st .dot{width:20px;height:20px;border-radius:50%;background:var(--line);
    color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:11px;flex:none;}
  .stepper .st.done .dot{background:var(--green);color:#fff;}
  .stepper .st.current{border-color:var(--navy);color:var(--navy);}
  .stepper .st.current .dot{background:var(--navy);color:#fff;}
  /* cards */
  .card{background:var(--card);border:1px solid var(--line);border-radius:13px;
    padding:22px 24px;margin-bottom:16px;}
  .card h2{font-size:15.5px;color:var(--navy);margin-bottom:3px;}
  .card .lead{font-size:12.5px;color:var(--muted);margin-bottom:16px;}
  .secband{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
    color:var(--green-dark);background:var(--green-soft);display:inline-block;
    padding:3px 10px;border-radius:5px;margin-bottom:10px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:13px 18px;}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px 16px;}
  .grid .full,.grid3 .full{grid-column:1/-1;}
  @media(max-width:640px){.grid,.grid3{grid-template-columns:1fr;}}
  label{display:block;font-size:12px;font-weight:600;color:var(--ink);margin-bottom:5px;}
  label .req{color:var(--red);}
  input,select,textarea{width:100%;padding:8px 10px;font-size:13px;font-family:inherit;
    border:1px solid var(--line);border-radius:7px;color:var(--ink);background:#fff;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--green);
    box-shadow:0 0 0 3px var(--green-soft);}
  textarea{resize:vertical;min-height:58px;}
  input.ro,textarea.ro{background:#F2F5F8;color:#55606E;}
  .hint{font-size:11px;color:var(--muted);margin-top:4px;}
  .subhead{font-size:12.5px;font-weight:700;color:var(--navy);margin:6px 0 9px;
    padding-bottom:5px;border-bottom:1px solid var(--line-soft);}
  /* loan type cards */
  .ltgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:640px){.ltgrid{grid-template-columns:1fr;}}
  .ltcard{border:1.5px solid var(--line);border-radius:11px;padding:14px;cursor:pointer;
    display:flex;gap:12px;background:#fff;}
  .ltcard:hover{border-color:var(--green);background:var(--green-soft);}
  .ltcard.sel{border-color:var(--green);background:var(--green-soft);box-shadow:0 0 0 3px var(--green-soft);}
  .ltnum{width:32px;height:32px;border-radius:8px;background:var(--navy);color:#fff;
    font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;flex:none;}
  .ltcard.sel .ltnum{background:var(--green);}
  .ltname{font-size:13.5px;font-weight:700;color:var(--navy);}
  .ltrate{font-size:11px;font-weight:700;color:var(--green-dark);margin:2px 0 4px;}
  .ltdesc{font-size:11.3px;color:var(--muted);}
  /* chips */
  .chip{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;}
  .chip.g{background:var(--green-soft);color:var(--green-dark);}
  .chip.a{background:var(--amber-soft);color:var(--amber);}
  .chip.r{background:var(--red-soft);color:var(--red);}
  .chip.n{background:#EAF0F6;color:var(--navy);}
  .chip.p{background:var(--purple-soft);color:var(--purple);}
  /* radio group */
  .radios{display:flex;gap:8px;flex-wrap:wrap;}
  .radios label{display:flex;align-items:center;gap:6px;font-weight:500;font-size:12.5px;
    border:1px solid var(--line);border-radius:7px;padding:7px 11px;cursor:pointer;margin:0;}
  .radios input{width:auto;}
  /* policy box */
  .policy{background:#F8FAFC;border:1px dashed var(--line);border-radius:9px;
    padding:12px 14px;font-size:11.5px;color:var(--muted);}
  .policy b{color:var(--navy);}
  .policy ul{margin:5px 0 0 15px;}
  /* checks */
  .check{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--line-soft);}
  .check:last-child{border-bottom:none;}
  .ic{width:20px;height:20px;border-radius:50%;flex:none;display:flex;align-items:center;
    justify-content:center;font-size:11px;font-weight:800;color:#fff;}
  .ic.pass{background:var(--green);} .ic.fail{background:var(--red);} .ic.warn{background:var(--amber);}
  .check .cl{font-size:12.5px;font-weight:600;}
  .check .cd{font-size:11.3px;color:var(--muted);}
  /* verdict */
  .verdict{border-radius:11px;padding:14px 18px;margin-bottom:14px;}
  .verdict .vt{font-size:14.5px;font-weight:800;}
  .verdict .vs{font-size:12px;margin-top:2px;}
  .verdict.ok{background:var(--green-soft);color:var(--green-dark);}
  .verdict.review{background:var(--amber-soft);color:var(--amber);}
  .verdict.no{background:var(--red-soft);color:var(--red);}
  /* summary boxes */
  .sumgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:12px 0;}
  @media(max-width:640px){.sumgrid{grid-template-columns:1fr 1fr;}}
  .sumbox{background:#F8FAFC;border:1px solid var(--line);border-radius:9px;padding:10px 12px;}
  .sumbox .sl{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.03em;}
  .sumbox .sv{font-size:15.5px;font-weight:800;color:var(--navy);margin-top:3px;}
  .sumbox .sv.green{color:var(--green-dark);}
  /* definition rows */
  .drow{display:flex;justify-content:space-between;gap:14px;padding:6px 0;
    border-bottom:1px solid var(--line-soft);font-size:12.5px;}
  .drow:last-child{border-bottom:none;}
  .drow .dk{color:var(--muted);} .drow .dv{font-weight:600;text-align:right;}
  /* tables */
  table{width:100%;border-collapse:collapse;font-size:12px;}
  th{text-align:left;padding:8px 9px;background:#F2F5F8;color:var(--muted);
    font-size:10.5px;text-transform:uppercase;letter-spacing:.03em;border-bottom:1px solid var(--line);}
  td{padding:8px 9px;border-bottom:1px solid var(--line-soft);}
  tr:last-child td{border-bottom:none;}
  .tnum{text-align:right;font-variant-numeric:tabular-nums;}
  .atable input{padding:5px 7px;font-size:12px;text-align:center;}
  /* buttons */
  .nav{display:flex;justify-content:space-between;gap:10px;margin-top:4px;}
  .btn{padding:10px 20px;font-size:13px;font-weight:700;border-radius:8px;cursor:pointer;
    border:1px solid transparent;font-family:inherit;}
  .btn.primary{background:var(--green);color:#fff;} .btn.primary:hover{background:var(--green-dark);}
  .btn.ghost{background:#fff;color:var(--navy);border-color:var(--line);}
  .btn.ghost:hover{border-color:var(--navy);}
  .btn.dark{background:var(--navy);color:#fff;} .btn.dark:hover{background:var(--navy-dark);}
  .btn.danger{background:#fff;color:var(--red);border-color:var(--red);}
  .btn.danger:hover{background:var(--red-soft);}
  .btn.sm{padding:7px 14px;font-size:12px;}
  .btn:disabled{opacity:.45;cursor:not-allowed;}
  /* doc upload */
  .docrow{display:flex;justify-content:space-between;align-items:center;gap:12px;
    padding:12px 2px;border-bottom:1px solid var(--line-soft);}
  .docrow:last-of-type{border-bottom:none;}
  .docname{font-size:12.5px;font-weight:600;}
  .docstatus{font-size:11px;color:var(--muted);margin-top:3px;}
  .uploadbtn{flex:none;background:#fff;border:1px solid var(--green);color:var(--green-dark);
    font-size:12px;font-weight:700;padding:7px 13px;border-radius:7px;cursor:pointer;white-space:nowrap;}
  .uploadbtn:hover{background:var(--green-soft);}
  /* queue */
  .qcard{display:flex;align-items:center;gap:14px;border:1px solid var(--line);
    border-radius:10px;padding:13px 15px;margin-bottom:9px;background:#fff;}
  .qcard .qref{font-size:12px;font-weight:800;color:var(--navy);}
  .qcard .qname{font-size:13.5px;font-weight:700;}
  .qcard .qmeta{font-size:11.3px;color:var(--muted);margin-top:1px;}
  .qcard .qamt{margin-left:auto;text-align:right;}
  .qcard .qamt .qv{font-size:14px;font-weight:800;color:var(--navy);}
  .empty{text-align:center;color:var(--muted);font-size:12.5px;padding:26px;}
  /* kpis */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
  @media(max-width:640px){.kpis{grid-template-columns:1fr 1fr;}}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:13px 15px;}
  .kpi .kl{font-size:11px;color:var(--muted);font-weight:600;}
  .kpi .kv{font-size:20px;font-weight:800;color:var(--navy);margin-top:3px;}
  .bar{height:11px;background:var(--line);border-radius:6px;overflow:hidden;margin:7px 0 4px;}
  .bar > div{height:100%;border-radius:6px;}
  .backlink{font-size:12px;font-weight:700;color:var(--green-dark);cursor:pointer;
    display:inline-block;margin-bottom:12px;}
  .hidden{display:none;}
  .foot{font-size:11px;color:var(--muted);margin-top:26px;line-height:1.6;}
  .auth{background:#F8FAFC;border:1px solid var(--line);border-radius:9px;
    padding:13px 15px;font-size:11.8px;color:var(--ink);line-height:1.65;}
  /* scrollable table */
  .scrollbox{max-height:236px;overflow:auto;border:1px solid var(--line);border-radius:8px;}
  .scrollbox table{font-size:11.5px;}
  .scrollbox th{position:sticky;top:0;}
  /* timeline */
  .tl{margin:8px 0 2px;}
  .tlrow{display:flex;gap:13px;}
  .tlmark{display:flex;flex-direction:column;align-items:center;flex:none;}
  .tldot{width:24px;height:24px;border-radius:50%;background:var(--line);color:var(--muted);
    display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex:none;}
  .tlrow.done .tldot{background:var(--green);color:#fff;}
  .tlrow.current .tldot{background:var(--navy);color:#fff;}
  .tlrow.bad .tldot{background:var(--red);color:#fff;}
  .tlline{width:2px;flex:1;background:var(--line);min-height:16px;}
  .tlrow.done .tlline{background:var(--green);}
  .tlbody{padding-bottom:15px;}
  .tlname{font-size:13px;font-weight:700;color:var(--navy);}
  .tlmeta{font-size:11.3px;color:var(--muted);margin-top:1px;}
  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(20,30,45,.55);display:flex;
    align-items:flex-start;justify-content:center;padding:34px 16px;overflow:auto;z-index:60;}
  .modal{background:#fff;border-radius:13px;max-width:720px;width:100%;overflow:hidden;
    box-shadow:0 22px 60px rgba(0,0,0,.32);}
  .modal-h{background:var(--navy);color:#fff;padding:14px 20px;display:flex;
    justify-content:space-between;align-items:center;}
  .modal-h h3{font-size:14px;font-weight:700;}
  .modal-x{cursor:pointer;font-size:15px;color:#fff;background:none;border:none;font-weight:700;}
  .modal-b{padding:20px;max-height:74vh;overflow:auto;}
  .email{border:1px solid var(--line);border-radius:10px;margin-bottom:14px;overflow:hidden;}
  .email:last-child{margin-bottom:0;}
  .email-h{background:#F2F5F8;padding:9px 14px;font-size:11.3px;border-bottom:1px solid var(--line);
    color:var(--muted);line-height:1.7;}
  .email-h b{color:var(--ink);}
  .email-b{padding:14px;font-size:12px;line-height:1.6;}
  .email-b p{margin-bottom:8px;}
  .doc{border:1px solid var(--line);border-radius:8px;padding:13px 15px;margin-top:10px;background:#FCFCFD;}
  .doc .doct{font-size:10.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;
    color:var(--green-dark);margin-bottom:6px;}
</style>
</head>

/* ============================================================

/* whole-peso amount written out in words, e.g. 10000 -> "Ten Thousand Pesos" */
function pesosInWords(n){
  n=Math.round(n||0);
  if(n===0) return "Zero Pesos";
  const ones=["","One","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten",
    "Eleven","Twelve","Thirteen","Fourteen","Fifteen","Sixteen","Seventeen","Eighteen","Nineteen"];
  const tens=["","","Twenty","Thirty","Forty","Fifty","Sixty","Seventy","Eighty","Ninety"];
  function three(x){let s="";
    if(x>=100){s+=ones[Math.floor(x/100)]+" Hundred";x%=100;if(x)s+=" ";}
    if(x>=20){s+=tens[Math.floor(x/10)];x%=10;if(x)s+="-"+ones[x];}
    else if(x>0){s+=ones[x];}
    return s;}
  const scales=["","Thousand","Million","Billion"];
  let parts=[],i=0,x=n;
  while(x>0){const c=x%1000;if(c)parts.unshift(three(c)+(scales[i]?" "+scales[i]:""));x=Math.floor(x/1000);i++;}
  return parts.join(" ")+" Pesos";
}

/* ============================================================
   HELPERS
   ============================================================ */
const peso  = n => "₱" + Math.round(n||0).toLocaleString("en-PH");
const peso2 = n => "₱" + (Math.round((n||0)*100)/100).toLocaleString("en-PH",{minimumFractionDigits:2,maximumFractionDigits:2});
function esc(s){return (s==null?"":""+s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));}
function fmtDate(s){if(!s)return "—";const d=new Date(s);if(isNaN(d))return s;
  return d.toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"});}
function todayISO(){const d=CONFIG.today;return d.toISOString().slice(0,10);}
function tenureYears(hire){if(!hire)return 0;return (CONFIG.today-new Date(hire))/(365.25*24*3600*1000);}
function tenureText(hire){const y=tenureYears(hire);const yr=Math.floor(y);const mo=Math.round((y-yr)*12);
  return yr+" yr"+(yr!==1?"s":"")+" "+mo+" mo";}
function addMonths(iso,m){const d=new Date(iso);d.setMonth(d.getMonth()+m);return d;}
function rateLabel(t){if(t.rate===0)return "0% interest";
  return t.rate+"% per annum ("+(t.rate/12)+"% per month)";}

/* ============================================================
   COMPUTATION  (flat-rate, matches RCC reference sheet)
   ============================================================ */
function compute(principal,ratePct,term){
  const interest=principal*(ratePct/100)*(term/12);
  const total=principal+interest;
  const monthly=term>0?total/term:0;
  return {principal,ratePct,term,interest,total,monthly,perCutoff:monthly/2};
}
function schedule(c){
  const rows=[];let bal=c.principal;
  const pP=c.principal/c.term,pI=c.interest/c.term;
  for(let m=1;m<=c.term;m++){bal-=pP;rows.push({m,payment:c.monthly,principal:pP,interest:pI,balance:Math.max(0,bal)});}
  return rows;
}

/* ============================================================
   ELIGIBILITY ENGINE
   ============================================================ */
function assess(s1){
  const t=CONFIG.LOAN_TYPES[s1.loanType];
  const ten=tenureYears(s1.hireDate);
  const c=compute(s1.amount,t.rate,s1.term);
  const checks=[];const add=(l,st,d,internal)=>checks.push({l,st,d,internal});

  add(`Minimum tenure — ${t.minTenure} year${t.minTenure!==1?"s":""}`,
      ten>=t.minTenure?"pass":"fail",
      `Hired ${fmtDate(s1.hireDate)} · ${ten.toFixed(1)} yrs (from Date Hired)`);
  add("Employment status — Regular", s1.status==="Regular"?"pass":"fail",`Status: ${s1.status}`);
  const active=s1.rccStatus==="On-going";
  add("No other active RCC loan", active?"fail":"pass",
      active?"Has an on-going RCC loan — only one allowed":"No active RCC loan on record");
  if(t.maxAmount)
    add(`Within the ${peso(t.maxAmount)} per-loan cap (HR control)`, s1.amount<=t.maxAmount?"pass":"warn",`Requested ${peso(s1.amount)}`, true);
  if(s1.amount<=0) add("Valid requested amount","fail","No loan amount entered");

  if(s1.loanType==="educational"){
    add("Within the 3-children limit", s1.det.childCount<3?"pass":"warn",
        `${s1.det.childCount} child${s1.det.childCount===1?"":"ren"} already in the program`);
    if(s1.det.eduReloan)
      add("Reloan — 50% of parent loan repaid", s1.det.eduRepaidPct>=50?"pass":"fail",
          `${s1.det.eduRepaidPct||0}% repaid (50% minimum required)`);
  }
  if(s1.loanType==="moto"){
    const dpPct=s1.det.motoPrice>0?s1.det.downPayment/s1.det.motoPrice*100:0;
    add("Down payment of at least 10%", dpPct>=t.minDpPct?"pass":"warn",
        `${peso(s1.det.downPayment)} (${dpPct.toFixed(0)}% of price)`);
    const sr=s1.monthlyIncome>0?c.monthly/s1.monthlyIncome*100:0;
    add("Amortization within 20% of salary", sr<=t.amortCapPctOfSalary?"pass":"warn",
        `${peso(c.monthly)} = ${sr.toFixed(0)}% of ${peso(s1.monthlyIncome)}`);
  }
  if(s1.loanType!=="moto" && s1.term>6)
    add("Repayment term within 6 months","warn",`${s1.term} months — extended term needs collateral / approval`);
  if(t.discretionary)
    add("Discretionary approval","warn","This loan type always requires management discretion");

  const totDed=s1.existingDeduction+c.monthly;
  const ratio=s1.monthlyIncome>0?totDed/s1.monthlyIncome*100:0;
  add(`Capacity to pay — deductions under ${CONFIG.capacitySoftCapPct}% of income`,
      ratio<=CONFIG.capacitySoftCapPct?"pass":"warn",
      `${peso(s1.existingDeduction)} + ${peso(c.monthly)} = ${peso(totDed)} (${ratio.toFixed(0)}% of ${peso(s1.monthlyIncome)})`);

  const avail=CONFIG.fundCap-fundUsed();
  add("Loan fund availability", s1.amount<=avail?"pass":"warn",
      `Available ${peso(avail)} of ${peso(CONFIG.fundCap)} cap`, true);

  const hasFail=checks.some(x=>x.st==="fail"),hasWarn=checks.some(x=>x.st==="warn");
  const verdict=hasFail?"NOT ELIGIBLE":(hasWarn?"FOR HR REVIEW":"PRE-QUALIFIED");
  return {computed:c,checks,verdict,capRatio:ratio};
}

function last6Months(){
  const arr=[],d=CONFIG.today;
  for(let i=6;i>=1;i--){const m=new Date(d.getFullYear(),d.getMonth()-i,1);
    arr.push(m.toLocaleDateString("en-US",{month:"long",year:"numeric"}));}
  return arr;
}
function blankAttendance(){return last6Months().map(m=>({month:m,absences:"",lates:"",undertime:""}));}
/* attendance auto-pulled from the timekeeping system (last 6 months) */
function genAttendance(seedKey){
  let n=0;const k=String(seedKey||"RCC");
  for(let i=0;i<k.length;i++) n+=k.charCodeAt(i)*(i+1);
  const rnd=i=>{const x=Math.sin(n*97+i*131)*10000;return x-Math.floor(x);};
  return last6Months().map((m,i)=>{
    const ra=rnd(i);
    return {month:m,
      absences: ra<0.80?0:(ra<0.94?1:2),
      lates: +((rnd(i+20)*1.3)).toFixed(2),
      undertime: rnd(i+40)<0.82?0:+((rnd(i+60)*0.6)).toFixed(2)};
  });
}
/* next semi-monthly cut-off strictly after date d (15th and end-of-month) */
function nextCutoff(d){
  const x=new Date(d),day=x.getDate();
  if(day<15) return new Date(x.getFullYear(),x.getMonth(),15);
  const eom=new Date(x.getFullYear(),x.getMonth()+1,0).getDate();
  if(day<eom) return new Date(x.getFullYear(),x.getMonth(),eom);
  return new Date(x.getFullYear(),x.getMonth()+1,15);
}
/* full per-cut-off repayment schedule for an application */
function deductionSchedule(app){
  const c=app.computed,s=app.s1,rows=[];
  let bal=c.total,d=s.releaseDate?new Date(s.releaseDate):new Date(CONFIG.today);
  const n=Math.max(1,c.term*2);
  for(let i=0;i<n;i++){
    d=nextCutoff(d);
    const amt=i===n-1?bal:c.perCutoff;
    bal=Math.max(0,bal-amt);
    rows.push({no:i+1,date:new Date(d),amount:amt,balance:bal});
  }
  return rows;
}
function fmtSchedDate(d){return d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}

/* ---- wizard navigation ---- */
function wBack2(){}
function wNext(){
  if(!wValidate())return;
  if(wstep===WSTEPS.length-1){wSubmit();return;}
  wstep++;renderWizard();
}
function wValidate(){
  const s=draft.s1,g=id=>document.getElementById(id);
  if(wstep===0){
    if(!draft.verified||!draft.rec){alert("Please enter your Employee ID and click Verify.");return false;}
    if(!draft.rec.loanEligible){alert("The company loan program is for Head Office & Warehouse employees only. Retail / Merchandiser staff are not eligible.");return false;}
    if(draft.rec.status!=="Regular"){alert("Only regular employees are eligible to apply for a loan.");return false;}
    return true;
  }
  if(wstep===1){ if(!s.loanType){alert("Please select a loan type.");return false;} return true; }
  if(wstep===2){
    wCollectDetails();
    if(!s.purpose.trim()){alert("Please describe the purpose of the loan.");return false;}
    if(s.loanType==="educational"&&(!s.det.childName.trim()||!s.det.school.trim()||!s.det.semesterTotal)){
      alert("Please complete child's name, school and total tuition & fees.");return false;}
    if(s.loanType==="moto"&&(!s.det.motoModel.trim()||!s.det.motoPrice||!s.det.downPayment)){
      alert("Please enter the motorcycle model, price and down payment.");return false;}
    if(s.loanType==="vehicle"&&(!s.det.vehicleInfo.trim()||!s.det.repairCost||!s.amount)){
      alert("Please enter the vehicle details, repair cost and requested amount.");return false;}
    if(s.loanType==="medical"&&(!s.det.treatment.trim()||!s.amount)){
      alert("Please enter the treatment and requested amount.");return false;}
    if(s.loanType==="others"&&(!s.det.situation.trim()||!s.amount)){
      alert("Please describe the situation and requested amount.");return false;}
    return true;
  }
  if(wstep===3){
    const missing=docsFor(s).filter(d=>docRequired(d)&&!s.docs[d]);
    if(missing.length){alert("Please upload the required proof documents before continuing:\n\n• "+missing.join("\n• "));return false;}
    return true;
  }
  if(wstep===4){
    s.ackName=g("a_name").value.trim();
    if(!g("a_ack").checked){alert("Please tick the Authorization for Salary Deduction to proceed.");return false;}
    if(!s.ackName){alert("Please type the borrower's name as the digital signature.");return false;}
    s.ackSigned=true;
    return true;
  }
  return true;
}
function wSubmit(){
  const s=draft.s1;
  const ev=assess(s);
  const app={ref:newRef(),stage:"PENDING_HR",appDate:s.appDate,
    s1:JSON.parse(JSON.stringify(s)),computed:ev.computed,
    elig:{checks:ev.checks,verdict:ev.verdict},
    attendance:genAttendance(s.empId),loanHistory:loanHistoryFor(s.empId),
    hr:{done:false},sup:{done:false},mgmt:{done:false}};
  APPS.push(app);
  alert("Application "+app.ref+" submitted.\n\nSystem pre-screen: "+ev.verdict+
        "\nMonthly amortization: "+peso(ev.computed.monthly)+
        "\n\nA confirmation has been sent to the email on file: "+(s.email||"(no email on record)")+
        "\nIt now moves to Section 2 — HR Review.");
  newDraft();
  ui.tab="hr";ui.selRef=null;render();
}

  if(!notes){alert("Please add HR notes explaining your recommendation.");return;}

  const s=a.s1;

  s.rccOrig=parseFloat(g("hr_rccOrig").value)||0;
  s.rccBalance=parseFloat(g("hr_rccBal").value)||0;
  s.prevLoanAmt=parseFloat(g("hr_prevAmt").value)||0;
  s.prevLoanDate=g("hr_prevDate").value||"";

  s.sssStatus=g("hr_sssStatus").value;
  s.sssBalance=parseFloat(g("hr_sssBal").value)||0;
  // re-run the eligibility assessment with the confirmed figures
  const ev=assess(s);
  a.computed=ev.computed;
  a.elig={checks:ev.checks,verdict:ev.verdict};
  a.hr={done:true,receivedBy:by,
    recommendation:forward?"Recommended for Approval":"Not Recommended",
    notes,date:todayISO()};
  if(forward){a.stage="PENDING_SUPERVISOR";ui.selRef=null;render();

function mgDecide(ref,approve){

  if(!by){alert("Please enter the approver's name.");return;}
  if(!fb){alert(approve?"Please add any release conditions or a confirmation note.":"Please enter the reason for declining.");return;}
  a.mgmt={done:true,decision:approve?"Approved for Release":"Declined",

function trackTimeline(a){
  const s=a.s1,t=CONFIG.LOAN_TYPES[s.loanType];
  const declined=a.stage==="DECLINED";
  const steps=[
    {name:"Application Submitted",meta:"Filed "+fmtDate(a.appDate),done:true},
    {name:"HR Review",done:a.hr.done,active:a.stage==="PENDING_HR",
      meta:a.hr.done?(a.hr.recommendation+" · "+fmtDate(a.hr.date)):"Awaiting HR review"},
    {name:"Supervisor Confirmation",done:a.sup.done,active:a.stage==="PENDING_SUPERVISOR",
      meta:a.sup.done?(a.sup.confirm+" · "+fmtDate(a.sup.date)):"Awaiting supervisor confirmation"},
    {name:"Management Approval",done:a.mgmt.done,active:a.stage==="PENDING_MANAGEMENT",
      meta:a.mgmt.done?(a.mgmt.decision+" · "+fmtDate(a.mgmt.date)):"Awaiting management decision"},
    {name:a.stage==="APPROVED"?"Approved for Release":(declined?"Not Approved":"Outcome"),
      done:a.stage==="APPROVED",bad:declined,
      meta:a.stage==="APPROVED"?"Loan approved — view and print your Loan Agreement below"
        :(declined?"A notification email with the reason has been sent":"Pending the final decision")}
  ];
  const rows=steps.map((st,i)=>{
    const last=i===steps.length-1;
    const cls=st.bad?"bad":(st.done?"done":(st.active?"current":""));
    const icon=st.bad?"✕":(st.done?"✓":(i+1));
    return `<div class="tlrow ${cls}">
      <div class="tlmark"><div class="tldot">${icon}</div>${last?"":`<div class="tlline"></div>`}</div>
      <div class="tlbody"><div class="tlname">${esc(st.name)}</div>
        <div class="tlmeta">${esc(st.meta)}</div></div></div>`;
  }).join("");
  return `${drow("Reference",a.ref)}
    ${drow("Loan type",esc(t.name))}
    ${drow("Amount",peso(a.computed.principal))}
    ${drow("Current status",`<span class="chip ${STAGES[a.stage].cls}">${STAGES[a.stage].label}</span>`)}
    <div class="subhead" style="margin-top:16px">Progress</div>
    <div class="tl">${rows}</div>${a.stage==="APPROVED"?`
    <div class="nav" style="margin-top:14px"><button class="btn primary" onclick="viewAgreement('${a.ref}')">View / Print my Loan Agreement</button></div>`:""}`;
}
