<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0e3219">
<title>RCC HRIS Portal</title>
<style>
  :root{
    --green:#1f6b3a; --green-dark:#144726; --green-deep:#0e3219; --green-light:#e8f2eb;
    --ink:#1c2521; --muted:#5d6b63; --line:#d8e0db; --bg:#f4f6f5; --card:#ffffff;
    --amber-bg:#fdf6e3; --amber-ink:#8a6a14; --amber-line:#e9d8a6;
    --blue:#2c6e8f; --blue-bg:#e7f1f5; --blue-line:#bcd9e4;
    --rose-bg:#fbeef0; --rose-ink:#a04451; --rose-line:#e9c6cd;
    --shadow:0 1px 3px rgba(20,40,30,.08),0 4px 18px rgba(20,40,30,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5;font-size:15px;-webkit-font-smoothing:antialiased;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;font-size:15px;}
  .hidden{display:none!important;}

  /* ---------- Login ---------- */
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(150deg,var(--green-deep),var(--green));padding:24px;}
  .login-card{background:#fff;border-radius:16px;box-shadow:var(--shadow);
    width:100%;max-width:380px;padding:34px 30px;}
  .login-card .brand{text-align:center;margin-bottom:22px;}
  .login-card .brand .mark{width:54px;height:54px;border-radius:13px;
    background:linear-gradient(150deg,var(--green-deep),var(--green));color:#fff;
    display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:22px;
    letter-spacing:-1px;margin-bottom:12px;}
  .login-card h1{font-size:20px;color:var(--green-dark);}
  .login-card .sub{font-size:13px;color:var(--muted);margin-top:3px;}
  .field{margin-top:14px;}
  .field label{display:block;font-size:12px;font-weight:700;color:var(--muted);
    text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
  .field input,.field select,.field textarea{width:100%;padding:11px 13px;border:1px solid var(--line);
    border-radius:9px;background:#fff;color:var(--ink);outline:none;transition:border .15s;}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--green);}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;
    padding:11px 18px;border-radius:9px;border:1px solid transparent;font-weight:700;font-size:14px;}
  .btn-primary{background:var(--green);color:#fff;width:100%;margin-top:20px;}
  .btn-primary:hover{background:var(--green-dark);}
  .btn-primary:disabled{opacity:.6;cursor:default;}
  .btn-ghost{background:#fff;border:1px solid var(--line);color:var(--ink);}
  .btn-ghost:hover{background:var(--green-light);border-color:#c3decb;}
  .msg{margin-top:14px;font-size:13px;padding:9px 12px;border-radius:8px;display:none;}
  .msg.err{display:block;background:var(--rose-bg);color:var(--rose-ink);border:1px solid var(--rose-line);}
  .msg.ok{display:block;background:var(--green-light);color:var(--green-dark);border:1px solid #c3decb;}

  /* ---------- App shell ---------- */
  #app{min-height:100vh;display:flex;flex-direction:column;}
  .topbar{background:var(--green-deep);color:#fff;padding:12px 18px;display:flex;
    align-items:center;gap:12px;position:sticky;top:0;z-index:20;}
  .topbar .mark{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.12);
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;letter-spacing:-1px;}
  .topbar .title{font-weight:800;font-size:16px;letter-spacing:-.2px;}
  .topbar .title small{display:block;font-weight:500;font-size:11px;opacity:.7;letter-spacing:.3px;}
  .topbar .spacer{flex:1;}
  .topbar .who{font-size:12.5px;opacity:.85;margin-right:4px;}
  .topbar button{background:rgba(255,255,255,.14);color:#fff;border:none;padding:8px 13px;
    border-radius:8px;font-size:13px;font-weight:600;}
  .topbar button:hover{background:rgba(255,255,255,.24);}

  .wrap{max-width:1100px;width:100%;margin:0 auto;padding:18px;}

  /* KPI row */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow);}
  .kpi .n{font-size:24px;font-weight:800;color:var(--green-dark);line-height:1;}
  .kpi .l{font-size:12px;color:var(--muted);margin-top:5px;font-weight:600;}

  /* Controls */
  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
  .search{flex:1;min-width:200px;position:relative;}
  .search input{width:100%;padding:11px 13px 11px 38px;border:1px solid var(--line);border-radius:10px;background:#fff;}
  .search input:focus{border-color:var(--green);outline:none;}
  .search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.45;}
  .controls select{padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);}
  .count{font-size:13px;color:var(--muted);margin-left:auto;font-weight:600;white-space:nowrap;}

  /* Table (desktop) */
  .tablecard{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);}
  table.emp{width:100%;border-collapse:collapse;}
  table.emp th{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);
    font-weight:700;text-align:left;padding:11px 14px;border-bottom:1px solid var(--line);background:#fbfcfb;}
  table.emp td{padding:12px 14px;border-bottom:1px solid var(--line);font-size:14px;}
  table.emp tr:last-child td{border-bottom:none;}
  table.emp tbody tr{cursor:pointer;transition:background .12s;}
  table.emp tbody tr:hover{background:var(--green-light);}
  .ename{font-weight:700;color:var(--ink);}
  .esub{font-size:12px;color:var(--muted);margin-top:1px;}

  .pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;white-space:nowrap;}
  .pill.active{background:var(--green-light);color:var(--green-dark);border:1px solid #c3decb;}
  .pill.sep{background:#eef0ee;color:var(--muted);border:1px solid #d8ddd8;}
  .pill.leave{background:var(--amber-bg);color:var(--amber-ink);border:1px solid var(--amber-line);}
  .pill.awol,.pill.susp{background:var(--rose-bg);color:var(--rose-ink);border:1px solid var(--rose-line);}
  .pill.grp{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-line);}

  .empty{padding:50px 20px;text-align:center;color:var(--muted);}
  .loading{padding:50px;text-align:center;color:var(--muted);}

  /* Detail / form drawer */
  .overlay{position:fixed;inset:0;background:rgba(14,50,25,.45);z-index:30;display:flex;justify-content:flex-end;}
  .drawer{background:var(--bg);width:100%;max-width:560px;height:100%;overflow-y:auto;
    box-shadow:-6px 0 30px rgba(0,0,0,.18);animation:slide .2s ease;}
  @keyframes slide{from{transform:translateX(30px);opacity:.6;}to{transform:translateX(0);opacity:1;}}
  .drawer-head{background:linear-gradient(135deg,var(--green-deep),var(--green));color:#fff;
    padding:20px 22px;position:sticky;top:0;z-index:2;}
  .drawer-head .x{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.18);border:none;
    color:#fff;width:32px;height:32px;border-radius:8px;font-size:18px;line-height:1;}
  .drawer-head .x:hover{background:rgba(255,255,255,.3);}
  .drawer-head h2{font-size:21px;letter-spacing:-.3px;padding-right:40px;}
  .drawer-head .meta{font-size:13px;opacity:.9;margin-top:4px;}
  .drawer-head .tags{margin-top:10px;display:flex;gap:6px;flex-wrap:wrap;}
  .drawer-head .tags .pill{background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.25);}
  .drawer-body{padding:18px 22px 60px;}
  .sect{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:13px;}
  .sect h3{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--green-dark);
    font-weight:800;margin-bottom:11px;display:flex;align-items:center;gap:8px;}
  .sect h3 .dot{width:7px;height:7px;border-radius:50%;background:var(--green);}
  .row{display:flex;justify-content:space-between;gap:14px;padding:6px 0;font-size:14px;border-bottom:1px dashed #eceeec;}
  .row:last-child{border-bottom:none;}
  .row .k{color:var(--muted);flex-shrink:0;}
  .row .v{text-align:right;font-weight:600;color:var(--ink);word-break:break-word;}
  .row .v.blank{color:#b7bfb9;font-weight:500;font-style:italic;}
  .drawer-actions{display:flex;gap:10px;margin-bottom:16px;}
  .drawer-actions .btn{flex:1;}

  /* Form */
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .form-grid .field{margin-top:0;}
  .form-grid .full{grid-column:1/-1;}
  .fmsg{margin:4px 0 0;font-size:13px;padding:9px 12px;border-radius:8px;}

  footer.appfoot{text-align:center;color:var(--muted);font-size:12px;padding:18px;}

  @media(max-width:760px){
    .kpis{grid-template-columns:repeat(2,1fr);}
    table.emp thead{display:none;}
    table.emp,table.emp tbody,table.emp tr,table.emp td{display:block;width:100%;}
    table.emp tr{padding:12px 14px;border-bottom:1px solid var(--line);}
    table.emp td{border:none;padding:2px 0;}
    table.emp td.tdpos{color:var(--muted);font-size:13px;}
    table.emp td.tdright{margin-top:6px;}
    .form-grid{grid-template-columns:1fr;}
    .count{width:100%;margin-left:0;}
  }
</style>
</head>
<body>

<!-- ===================== LOGIN ===================== -->
<div id="login">
  <div class="login-card">
    <div class="brand">
      <div class="mark">RCC</div>
      <h1>RCC HRIS Portal</h1>
      <div class="sub">Roshan Commercial Corporation — HR</div>
    </div>
    <form id="loginForm">
      <div class="field">
        <label>Email</label>
        <input type="email" id="liEmail" autocomplete="username" required placeholder="you@hassarams.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="liPass" autocomplete="current-password" required placeholder="••••••••">
      </div>

      <div class="msg" id="liMsg"></div>

</div>

<!-- ===================== APP ===================== -->
<div id="app" class="hidden">
  <div class="topbar">
    <div class="mark">RCC</div>
    <div class="title">RCC HRIS Portal<small>Employee Directory</small></div>
    <div class="spacer"></div>
    <span class="who" id="who"></span>
    <button id="logoutBtn">Sign out</button>
  </div>

  <div class="wrap">
    <div class="kpis" id="kpis"></div>

    <div class="controls">
      <div class="search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="search" placeholder="Search name, position, worksite, department…">
      </div>
      <select id="fGroup">
        <option value="">All groups</option>
        <option>Head Office</option>
        <option>Warehouse</option>
        <option>Retail</option>
      </select>
      <select id="fStatus">
        <option value="active">Active only</option>
        <option value="">All statuses</option>
        <option value="Separated">Separated</option>
        <option value="On Leave">On Leave</option>
        <option value="AWOL">AWOL</option>
        <option value="Suspended">Suspended</option>
      </select>
      <button class="btn btn-ghost" id="addBtn">+ Add</button>
      <span class="count" id="count"></span>
    </div>

    <div class="tablecard">
      <table class="emp">
        <thead><tr><th>Name</th><th>Department / Position</th><th>Worksite</th><th>Group</th><th>Status</th></tr></thead>
        <tbody id="rows"><tr><td colspan="5" class="loading">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>
  <footer class="appfoot">RCC HRIS Portal · Roshan Commercial Corporation</footer>
</div>

<!-- Detail / Form drawer mount -->
<div id="drawerMount"></div>

<script>
/* ===========================================================================
   RCC HRIS Portal — Employee Directory (v1)
   Vanilla JS + Supabase. One source of truth: public.employees.
   =========================================================================== */
const { SUPABASE_URL, SUPABASE_ANON_KEY } = window.RCC_CONFIG;
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const $ = (id) => document.getElementById(id);
const el = (sel) => document.querySelector(sel);

let EMPLOYEES = [];   // full cache
let CURRENT_USER = null;

/* ---------- Reference lists (match the locked data model) ---------- */
const DEPARTMENTS = ["Accounting","Administration","E-Commerce","Finance","Human Resource",
  "Inventory","Logistics","Marketing","MIS","Product","Production","Purchasing","Sales",
  "Warehouse Solaris","Warehouse"];
const WAREHOUSE_DEPTS = ["Warehouse Solaris","Warehouse"];
const RETAIL_DEPTS = ["Sales"]; // sales/merchandising sits in Retail
const STATUSES = ["Active","On Leave","AWOL","Suspended","Separated"];
const CONTRACT_TYPES = ["Probationary","Regular","Project-Based","Seasonal/Fixed-Term","Casual","Agency"];
const HIRE_SOURCES = ["Direct","Jell-on","M&G"];
const GENDERS = ["Male","Female"];
const CIVIL = ["Single","Married","Widowed","Separated","Annulled"];
const RELATIONS = ["Spouse","Parent","Sibling","Child","Relative","Friend"];
const END_REASONS = ["Resigned","Terminated","End of Contract","AWOL","Retired","Deceased","Other"];

/* Group auto-derived from department (locked rule) */
function deriveGroup(dept){
  if(!dept) return "";
  if(WAREHOUSE_DEPTS.includes(dept)) return "Warehouse";
  if(RETAIL_DEPTS.includes(dept)) return "Retail";
  return "Head Office";
}
/* Bank auto from group (locked rule) */
function deriveBank(group){
  if(group==="Retail") return "Union Bank";
  if(group==="Head Office"||group==="Warehouse") return "China Bank";
  return "";
}

/* ============================ AUTH ============================ */
async function init(){
  const { data:{ session } } = await sb.auth.getSession();
  if(session){ showApp(session.user); }
  sb.auth.onAuthStateChange((_e, s)=>{ if(!s) showLogin(); });
}

$("loginForm").addEventListener("submit", async (e)=>{
  e.preventDefault();
  const btn=$("liBtn"), msg=$("liMsg");
  msg.className="msg"; btn.disabled=true; btn.textContent="Signing in…";
  const { data, error } = await sb.auth.signInWithPassword({
    email: $("liEmail").value.trim(), password: $("liPass").value });
  btn.disabled=false; btn.textContent="Sign in";
  if(error){ msg.className="msg err"; msg.textContent=error.message; return; }
  showApp(data.user);
});

$("logoutBtn").addEventListener("click", async ()=>{ await sb.auth.signOut(); showLogin(); });

function showLogin(){
  CURRENT_USER=null;
  $("app").classList.add("hidden");
  $("login").classList.remove("hidden");
  $("liPass").value="";
}
async function showApp(user){
  CURRENT_USER=user;
  $("login").classList.add("hidden");
  $("app").classList.remove("hidden");
  $("who").textContent = user.email;
  await loadEmployees();
}

/* ============================ DATA ============================ */
async function loadEmployees(){
  $("rows").innerHTML = `<tr><td colspan="5" class="loading">Loading…</td></tr>`;
  const { data, error } = await sb.from("employees").select("*").order("full_name");
  if(error){
    $("rows").innerHTML = `<tr><td colspan="5" class="empty">Could not load: ${error.message}</td></tr>`;
    return;
  }
  EMPLOYEES = data || [];
  renderKpis();
  render();
}

function renderKpis(){
  const total=EMPLOYEES.length;
  const active=EMPLOYEES.filter(e=>e.status==="Active").length;
  const retail=EMPLOYEES.filter(e=>e.group_name==="Retail"&&e.status==="Active").length;
  const ho=EMPLOYEES.filter(e=>(e.group_name==="Head Office"||e.group_name==="Warehouse")&&e.status==="Active").length;
  $("kpis").innerHTML = `
    <div class="kpi"><div class="n">${total}</div><div class="l">Total records</div></div>
    <div class="kpi"><div class="n">${active}</div><div class="l">Active employees</div></div>
    <div class="kpi"><div class="n">${ho}</div><div class="l">Head Office + Warehouse</div></div>
    <div class="kpi"><div class="n">${retail}</div><div class="l">Retail / merchandisers</div></div>`;
}

/* ============================ RENDER LIST ============================ */
function statusPill(s){
  const map={ "Active":"active","Separated":"sep","On Leave":"leave","AWOL":"awol","Suspended":"susp" };
  return `<span class="pill ${map[s]||'sep'}">${s||"—"}</span>`;
}
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

function render(){
  const q=$("search").value.trim().toLowerCase();
  const g=$("fGroup").value;
  const st=$("fStatus").value;
  let list=EMPLOYEES.filter(e=>{
    if(g && e.group_name!==g) return false;
    if(st==="active"){ if(e.status!=="Active") return false; }
    else if(st && e.status!==st) return false;
    if(q){
      const hay=[e.full_name,e.position,e.department,e.worksite,e.agency_name,e.email].join(" ").toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
  $("count").textContent = `${list.length} shown · ${EMPLOYEES.length} total`;
  if(!list.length){ $("rows").innerHTML=`<tr><td colspan="5" class="empty">No matches.</td></tr>`; return; }
  $("rows").innerHTML = list.map(e=>`
    <tr data-id="${e.id}">
      <td><div class="ename">${esc(e.full_name)}</div><div class="esub">${esc(e.email||"")}</div></td>
      <td class="tdpos"><div>${esc(e.department||"—")}</div><div class="esub">${esc(e.position||"")}</div></td>
      <td>${esc(e.worksite||"—")}</td>
      <td><span class="pill grp">${esc(e.group_name||"—")}</span></td>
      <td class="tdright">${statusPill(e.status)}</td>
    </tr>`).join("");
  $("rows").querySelectorAll("tr[data-id]").forEach(tr=>{
    tr.addEventListener("click",()=>openDetail(tr.dataset.id));
  });
}
["search","fGroup","fStatus"].forEach(id=>$(id).addEventListener("input",render));

/* ============================ DETAIL DRAWER ============================ */
function row(k,v,money){
  const blank = v==null||v==="";
  let val = blank ? "—" : esc(v);
  if(!blank && money) val = "₱"+Number(v).toLocaleString();
  return `<div class="row"><span class="k">${k}</span><span class="v ${blank?'blank':''}">${val}</span></div>`;
}
function fmtDate(d){ if(!d) return ""; const x=new Date(d+"T00:00:00"); return isNaN(x)?d:x.toLocaleDateString("en-US",{year:"numeric",month:"short",day:"numeric"}); }

function openDetail(id){
  const e=EMPLOYEES.find(x=>String(x.id)===String(id));
  if(!e) return;
  const m=$("drawerMount");
  m.innerHTML=`
  <div class="overlay" id="ovl">
    <div class="drawer" onclick="event.stopPropagation()">
      <div class="drawer-head">
        <button class="x" id="dX">×</button>
        <h2>${esc(e.full_name)}</h2>
        <div class="meta">${esc(e.position||"—")}${e.department?" · "+esc(e.department):""}</div>
        <div class="tags">
          <span class="pill">${esc(e.group_name||"—")}</span>
          <span class="pill">${esc(e.status||"—")}</span>
          ${e.hire_source&&e.hire_source!=="Direct"?`<span class="pill">${esc(e.hire_source)}</span>`:""}
        </div>
      </div>
      <div class="drawer-body">
        <div class="drawer-actions">
          <button class="btn btn-primary" id="dEdit">Edit record</button>
        </div>

        <div class="sect"><h3><span class="dot"></span>Identity &amp; Status</h3>
          ${row("PayPlus ID", e.employee_id)}
          ${row("Group", e.group_name)}
          ${row("Hire source", e.hire_source)}
          ${e.agency_name?row("Agency", e.agency_name):""}
          ${row("Status", e.status)}
        </div>

        <div class="sect"><h3><span class="dot"></span>Personal Details</h3>
          ${row("Email", e.email)}
          ${row("Mobile", e.phone)}
          ${row("Date of birth", fmtDate(e.date_of_birth))}
          ${row("Gender", e.gender)}
          ${row("Civil status", e.civil_status)}
          ${row("Permanent address", e.permanent_address)}
          ${row("Current address", e.current_address)}
        </div>

        <div class="sect"><h3><span class="dot"></span>Emergency Contact</h3>
          ${row("Name", e.emergency_contact_name)}
          ${row("Relationship", e.emergency_contact_relation)}
          ${row("Contact number", e.emergency_contact_number)}
        </div>

        <div class="sect"><h3><span class="dot"></span>Government Numbers</h3>
          ${row("SSS", e.sss_number)}
          ${row("PhilHealth", e.philhealth_number)}
          ${row("Pag-IBIG", e.pagibig_number)}
          ${row("TIN", e.tin_number)}
        </div>

        <div class="sect"><h3><span class="dot"></span>Bank</h3>
          ${row("Bank name", e.bank_name)}
          ${row("Account number", e.bank_account_number)}
        </div>

        <div class="sect"><h3><span class="dot"></span>Placement</h3>
          ${row("Department", e.department)}
          ${row("Position", e.position)}
          ${row("Worksite", e.worksite)}
          ${row("Supervisor", e.supervisor_name)}
          ${row("Approver 2", e.approver2_name||e.approver2_email)}
        </div>

        <div class="sect"><h3><span class="dot"></span>Employment Terms, Pay &amp; Dates</h3>
          ${row("Contract type", e.contract_type)}
          ${row("Daily rate", e.daily_rate, true)}
          ${row("Daily allowance", e.daily_allowance, true)}
          ${row("Hire date", fmtDate(e.hire_date))}
          ${row("Regularization date", fmtDate(e.regularization_date))}
          ${row("End date", fmtDate(e.end_date))}
          ${row("End reason", e.end_reason)}
        </div>

        ${e.notes?`<div class="sect"><h3><span class="dot"></span>Notes</h3><div style="font-size:14px;white-space:pre-wrap;">${esc(e.notes)}</div></div>`:""}
      </div>
    </div>
  </div>`;
  $("ovl").addEventListener("click",closeDrawer);
  $("dX").addEventListener("click",closeDrawer);
  $("dEdit").addEventListener("click",()=>openForm(e));
}
function closeDrawer(){ $("drawerMount").innerHTML=""; }

/* ============================ ADD / EDIT FORM ============================ */
$("addBtn").addEventListener("click",()=>openForm(null));

function opts(arr,sel){ return ['<option value=""></option>'].concat(
  arr.map(o=>`<option ${o===sel?"selected":""}>${esc(o)}</option>`)).join(""); }

function openForm(e){
  const isNew=!e; e=e||{};
  const m=$("drawerMount");
  m.innerHTML=`
  <div class="overlay" id="ovl">
    <div class="drawer" onclick="event.stopPropagation()">
      <div class="drawer-head">
        <button class="x" id="fX">×</button>
        <h2>${isNew?"Add Employee":"Edit Record"}</h2>
        <div class="meta">${isNew?"New employee record":esc(e.full_name)}</div>
      </div>
      <div class="drawer-body">
        <form id="empForm">
          <div class="sect"><h3><span class="dot"></span>Identity &amp; Status</h3>
            <div class="form-grid">
              <div class="field full"><label>Full name *</label><input id="f_full_name" required value="${esc(e.full_name||"")}"></div>
              <div class="field"><label>Department</label><select id="f_department">${opts(DEPARTMENTS,e.department)}</select></div>
              <div class="field"><label>Group (auto)</label><input id="f_group_name" readonly value="${esc(e.group_name||"")}" style="background:#f4f6f5;"></div>
              <div class="field"><label>Position</label><input id="f_position" value="${esc(e.position||"")}"></div>
              <div class="field"><label>Hire source</label><select id="f_hire_source">${opts(HIRE_SOURCES,e.hire_source)}</select></div>
              <div class="field"><label>Status</label><select id="f_status">${opts(STATUSES,e.status||"Active")}</select></div>
              <div class="field"><label>PayPlus ID</label><input id="f_employee_id" value="${esc(e.employee_id||"")}"></div>
              <div class="field full"><label>Agency name (if agency)</label><input id="f_agency_name" value="${esc(e.agency_name||"")}"></div>
            </div>
          </div>

          <div class="sect"><h3><span class="dot"></span>Personal Details</h3>
            <div class="form-grid">
              <div class="field"><label>Email</label><input id="f_email" type="email" value="${esc(e.email||"")}"></div>
              <div class="field"><label>Mobile (09XXXXXXXXX)</label><input id="f_phone" value="${esc(e.phone||"")}"></div>
              <div class="field"><label>Date of birth</label><input id="f_date_of_birth" type="date" value="${esc(e.date_of_birth||"")}"></div>
              <div class="field"><label>Gender</label><select id="f_gender">${opts(GENDERS,e.gender)}</select></div>
              <div class="field"><label>Civil status</label><select id="f_civil_status">${opts(CIVIL,e.civil_status)}</select></div>
              <div class="field full"><label>Permanent address</label><input id="f_permanent_address" value="${esc(e.permanent_address||"")}"></div>
              <div class="field full"><label>Current address</label><input id="f_current_address" value="${esc(e.current_address||"")}"></div>
            </div>
          </div>

          <div class="sect"><h3><span class="dot"></span>Emergency Contact</h3>
            <div class="form-grid">
              <div class="field"><label>Name</label><input id="f_emergency_contact_name" value="${esc(e.emergency_contact_name||"")}"></div>
              <div class="field"><label>Relationship</label><select id="f_emergency_contact_relation">${opts(RELATIONS,e.emergency_contact_relation)}</select></div>
              <div class="field full"><label>Contact number</label><input id="f_emergency_contact_number" value="${esc(e.emergency_contact_number||"")}"></div>
            </div>
          </div>

          <div class="sect"><h3><span class="dot"></span>Government Numbers</h3>
            <div class="form-grid">
              <div class="field"><label>SSS</label><input id="f_sss_number" value="${esc(e.sss_number||"")}"></div>
              <div class="field"><label>PhilHealth</label><input id="f_philhealth_number" value="${esc(e.philhealth_number||"")}"></div>
              <div class="field"><label>Pag-IBIG</label><input id="f_pagibig_number" value="${esc(e.pagibig_number||"")}"></div>
              <div class="field"><label>TIN</label><input id="f_tin_number" value="${esc(e.tin_number||"")}"></div>
            </div>
          </div>

          <div class="sect"><h3><span class="dot"></span>Bank</h3>
            <div class="form-grid">
              <div class="field"><label>Bank name (auto from group)</label><input id="f_bank_name" value="${esc(e.bank_name||"")}"></div>
              <div class="field"><label>Account number</label><input id="f_bank_account_number" value="${esc(e.bank_account_number||"")}"></div>
            </div>
          </div>

          <div class="sect"><h3><span class="dot"></span>Placement</h3>
            <div class="form-grid">
              <div class="field full"><label>Worksite</label><input id="f_worksite" value="${esc(e.worksite||"")}"></div>
              <div class="field"><label>Supervisor</label><input id="f_supervisor_name" value="${esc(e.supervisor_name||"")}"></div>
              <div class="field"><label>Approver 2</label><input id="f_approver2_name" value="${esc(e.approver2_name||"")}"></div>
            </div>
          </div>

          <div class="sect"><h3><span class="dot"></span>Employment Terms, Pay &amp; Dates</h3>
            <div class="form-grid">
              <div class="field"><label>Contract type</label><select id="f_contract_type">${opts(CONTRACT_TYPES,e.contract_type)}</select></div>
              <div class="field"><label>Daily rate (₱)</label><input id="f_daily_rate" type="number" step="0.01" value="${esc(e.daily_rate??"")}"></div>
              <div class="field"><label>Daily allowance (₱)</label><input id="f_daily_allowance" type="number" step="0.01" value="${esc(e.daily_allowance??"")}"></div>
              <div class="field"><label>Hire date</label><input id="f_hire_date" type="date" value="${esc(e.hire_date||"")}"></div>
              <div class="field"><label>Regularization date</label><input id="f_regularization_date" type="date" value="${esc(e.regularization_date||"")}"></div>
              <div class="field"><label>End date</label><input id="f_end_date" type="date" value="${esc(e.end_date||"")}"></div>
              <div class="field full"><label>End reason</label><select id="f_end_reason">${opts(END_REASONS,e.end_reason)}</select></div>
            </div>
          </div>

          <div class="sect"><h3><span class="dot"></span>Notes</h3>
            <div class="field"><textarea id="f_notes" rows="3">${esc(e.notes||"")}</textarea></div>
          </div>

          <div id="fMsg"></div>
          <div class="drawer-actions">
            <button type="button" class="btn btn-ghost" id="fCancel">Cancel</button>
            <button type="submit" class="btn btn-primary" id="fSave">${isNew?"Create":"Save changes"}</button>
          </div>
        </form>
      </div>
    </div>
  </div>`;

  $("ovl").addEventListener("click",closeDrawer);
  $("fX").addEventListener("click",closeDrawer);
  $("fCancel").addEventListener("click",closeDrawer);

  // auto-fill: group from department, bank from group
  $("f_department").addEventListener("change",()=>{
    const g=deriveGroup($("f_department").value);
    $("f_group_name").value=g;
    if(!$("f_bank_name").value) $("f_bank_name").value=deriveBank(g);
  });

  $("empForm").addEventListener("submit", async (ev)=>{
    ev.preventDefault();
    await saveEmployee(isNew?null:e.id);
  });
}

function val(id){ const v=$(id).value.trim(); return v===""?null:v; }
function numv(id){ const v=$(id).value.trim(); return v===""?null:Number(v); }

async function saveEmployee(id){
  const msg=$("fMsg"); const btn=$("fSave");
  // light normalization
  let phone=val("f_phone"); if(phone) phone=phone.replace(/[\s-]/g,"");
  const payload={
    full_name:val("f_full_name"), department:val("f_department"),
    group_name: val("f_group_name") || deriveGroup($("f_department").value) || null,
    position:val("f_position"), hire_source:val("f_hire_source"), status:val("f_status")||"Active",
    employee_id:val("f_employee_id"), agency_name:val("f_agency_name"),
    email:val("f_email"), phone, date_of_birth:val("f_date_of_birth"), gender:val("f_gender"),
    civil_status:val("f_civil_status"), permanent_address:val("f_permanent_address"),
    current_address:val("f_current_address"),
    emergency_contact_name:val("f_emergency_contact_name"),
    emergency_contact_relation:val("f_emergency_contact_relation"),
    emergency_contact_number:val("f_emergency_contact_number"),
    sss_number:val("f_sss_number"), philhealth_number:val("f_philhealth_number"),
    pagibig_number:val("f_pagibig_number"), tin_number:val("f_tin_number"),
    bank_name:val("f_bank_name"), bank_account_number:val("f_bank_account_number"),
    worksite:val("f_worksite"), supervisor_name:val("f_supervisor_name"),
    approver2_name:val("f_approver2_name"),
    contract_type:val("f_contract_type"), daily_rate:numv("f_daily_rate"),
    daily_allowance:numv("f_daily_allowance"), hire_date:val("f_hire_date"),
    regularization_date:val("f_regularization_date"), end_date:val("f_end_date"),
    end_reason:val("f_end_reason"), notes:val("f_notes"),
    updated_at:new Date().toISOString()
  };
  if(!payload.full_name){ msg.className="fmsg msg err"; msg.textContent="Full name is required."; return; }
  btn.disabled=true; btn.textContent="Saving…";
  let res;
  if(id){ res=await sb.from("employees").update(payload).eq("id",id); }
  else  { res=await sb.from("employees").insert(payload); }
  btn.disabled=false; btn.textContent=id?"Save changes":"Create";
  if(res.error){ msg.className="fmsg msg err"; msg.textContent=res.error.message; return; }
  closeDrawer();
  await loadEmployees();
}

/* ============================ GO ============================ */
init();

</script>
</body>
</html>
