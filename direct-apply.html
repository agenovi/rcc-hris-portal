<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>RCC — Apply</title>
<style>
  :root{--navy:#1E3A5F;--navy-d:#142a45;--ink:#1F2A37;--muted:#6B7785;--line:#E3E8EF;--bg:#F4F6F8;--green:#1c6b3f;--red:#c0392b;}
  *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  body{background:var(--bg);color:var(--ink);line-height:1.5;}
  .top{background:linear-gradient(135deg,var(--navy-d),var(--navy));color:#fff;padding:22px;}
  .top h1{font-size:21px;font-weight:800;}
  .top .s{opacity:.82;font-size:13px;margin-top:3px;}
  .wrap{max-width:560px;margin:0 auto;padding:18px 16px 70px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:14px;}
  label{font-size:12px;font-weight:700;color:var(--muted);display:block;margin:12px 0 4px;}
  input,select,textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;}
  .req{color:var(--red);}
  .btn{background:var(--navy);color:#fff;border:none;border-radius:9px;padding:12px 18px;font-weight:800;font-size:15px;cursor:pointer;width:100%;}
  .btn:disabled{opacity:.5;}
  .msg{font-size:13.5px;margin:10px 0;min-height:18px;}
  .done{text-align:center;padding:40px 20px;}
  .done .ok{font-size:46px;color:var(--green);}
  .note{font-size:12px;color:var(--muted);margin-top:10px;}
</style></head>
<body>
  <div class="top"><h1>Apply to Roshan Commercial Corporation</h1><div class="s">Tell us a few details — HR will review and get back to you. No login needed.</div></div>
  <div class="wrap" id="wrap">
    <div class="card">
      <label>Full name <span class="req">*</span></label><input id="f_name" placeholder="First Middle Last">
      <label>Email</label><input id="f_email" type="email">
      <label>Mobile number</label><input id="f_phone" placeholder="09XXXXXXXXX">
      <label>Position you're applying for <span class="req">*</span></label>
      <select id="f_pos">
        <option value="">Select a position…</option>
        <option>Merchandiser</option>
        <option>Store Supervisor</option>
        <option>Sales Coordinator</option>
        <option>Warehouse Staff</option>
        <option>Head Office / Administrative</option>
        <option>Other</option>
      </select>
      <label>Store / location (if you have one in mind)</label><input id="f_site">
      <label>Anything you'd like us to know (optional)</label><textarea id="f_notes" rows="2"></textarea>
      <div class="msg" id="msg"></div>
      <button class="btn" id="submitBtn" onclick="submitApp()">Submit application</button>
      <div class="note">After you submit, HR will contact you to complete your requirements and documents.</div>
    </div>
  </div>
<script>
const FN="https://jtfkpmvievetihhfdmqb.supabase.co/functions/v1/apply";
const esc=s=>(s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
async function submitApp(){
  const name=document.getElementById("f_name").value.trim(), msg=document.getElementById("msg");
  if(!name){ msg.style.color="#c0392b"; msg.textContent="Please enter your full name."; return; }
  if(!document.getElementById("f_pos").value){ msg.style.color="#c0392b"; msg.textContent="Please select the position you're applying for."; return; }
  const btn=document.getElementById("submitBtn"); btn.disabled=true; btn.textContent="Submitting…";
  const payload={ full_name:name, email:document.getElementById("f_email").value, phone:document.getElementById("f_phone").value,
    position:document.getElementById("f_pos").value, worksite:document.getElementById("f_site").value, notes:document.getElementById("f_notes").value };
  try{
    const r=await fetch(FN,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
    const d=await r.json();
    if(!d.ok){ btn.disabled=false; btn.textContent="Submit application"; msg.style.color="#c0392b"; msg.textContent=d.error||"Couldn't submit. Please try again."; return; }
    document.getElementById("wrap").innerHTML=`<div class="card done"><div class="ok">✓</div>
      <h2 style="font-size:18px;margin:10px 0 6px;">Application received</h2>
      <div style="color:var(--muted);font-size:13.5px;">Your reference: <b>${esc(d.ref)}</b><br>HR will review it and contact you. You can close this page.</div></div>`;
  }catch(e){ btn.disabled=false; btn.textContent="Submit application"; msg.style.color="#c0392b"; msg.textContent="Couldn't submit. Please try again."; }
}
</script></body></html>
